name: quranku
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  bloc: ^9.1.0
  connectivity_plus: ^7.0.0
  dartz: ^0.10.1
  dio: ^5.9.0
  equatable: ^2.0.7
  extended_image: ^10.0.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.2
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  gap: ^3.0.1
  get_it: ^9.0.5
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.3
  go_router_builder: ^4.1.1
  flutter_gen_runner: ^5.12.0
  json_serializable: ^6.11.1

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
